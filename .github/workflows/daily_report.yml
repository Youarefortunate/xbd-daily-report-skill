name: Daily Bot Automation

on:
  schedule:
    # 每天北京时间 18:20 运行 (UTC 10:20)
    - cron: '20 10 * * 1-5'
  workflow_dispatch:
    # 支持手动触发

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许回写 Git 仓库

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt
          playwright install chromium

      - name: Run Daily Bot
        env:
          GITLAB_URL: ${{ secrets.GITLAB_URL }}
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GITLAB_AUTHOR: ${{ secrets.GITLAB_AUTHOR }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_TARGET_CHAT_ID: ${{ secrets.FEISHU_TARGET_CHAT_ID }}
          WECOM_FORM_URL: ${{ secrets.WECOM_FORM_URL }}
          WECOM_COOKIES_JSON: ${{ secrets.WECOM_COOKIES_JSON }}
          RPA_SPEED: ${{ secrets.RPA_SPEED || '0.6' }}
          WECOM_LOGIN_TIMEOUT: ${{ secrets.WECOM_LOGIN_TIMEOUT || '60' }}
          HEADLESS: "true"
          GITHUB_ACTIONS: "true"
        run: |
          cd scripts
          python main.py
